<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="10" viewBox="0 0 400 10" preserveAspectRatio="none">
  <defs>
    <!-- RGB Gradient -->
    <linearGradient id="rgb-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%">
        <animate attributeName="stop-color" values="#00ffff;#ff00ff;#ffff00;#00ffff" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" values="#ff00ff;#ffff00;#00ffff;#ff00ff" dur="5s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    
    <!-- Thin Glow Filter -->
    <filter id="glow" x="-20%" y="-50%" width="140%" height="100%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Strict 3px Height Line -->
  <rect x="0" y="2" width="100%" height="3" fill="url(#rgb-glow)" filter="url(#glow)" rx="1.5" />
</svg>
