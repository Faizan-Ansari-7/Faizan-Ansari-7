<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 25" width="100%" preserveAspectRatio="none">
  <defs>
    <linearGradient id="rgb-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%">
        <animate attributeName="stop-color" values="#00ffff;#ff00ff;#ffff00;#00ffff" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" values="#ff00ff;#ffff00;#00ffff;#ff00ff" dur="5s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <rect x="0" y="8" width="100%" height="12" fill="url(#rgb-glow)" filter="url(#glow)" rx="4" />
</svg>
